<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Contact</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/main.css">

  <script src="https://kit.fontawesome.com/d0041be44b.js" crossorigin="anonymous"></script>
</head>

<body data-page="portfolio">
  <div class="navbar">

    <div class="hamburger-menu">
      <i class="fa fa-bars menu-toggle"></i>
    </div>

    <!-- Dropdown Links -->
    <div class="dropdown-links">
      <a href="Products.html" class="dropdown-link">Products</a>
      <a href="About.html" class="dropdown-link">About</a>
      <a href="Homepage.html" class="dropdown-link">Homepage</a>
      <a href="Booking.html" class="dropdown-link">Booking</a>
    </div>
  </div>

  <!--- Site Header --->
  <header class="site-header">
    <h1 id="typewriter"> Contact Me</h1>
  </header>

  <!--- Contatiner for the contact form --->
  <div class="form-container">
    
    <!--- Contact Form --->
    <form id="contactForm">

      <label for="name">Name:</label>
      <input type="text" id="name" name="name" placeholder="Enter your name" required>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required>

      <label for="message">Message:</label>
      <textarea id="message" name="message" rows="5" placeholder="Type your message here..." required></textarea>

      <button type="submit">Send</button>
    </form>
  </div>

  <footer class="site-footer">
    Created by Noah Jones
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
