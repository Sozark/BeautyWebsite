<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Contact – Solène</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel+Decorative:wght@400;700&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/d0041be44b.js" crossorigin="anonymous"></script>
</head>
<body>

  <!-- SITE HEADER (identical on every page) -->
  <header class="site-header">
    <div class="nav-container">

      <div class="hamburger" id="hamburger" aria-label="Open menu" role="button" tabindex="0">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="logo">Solène</div>
      
      <div class="cart-icon">
        <i class="fa-solid fa-shopping-bag"></i>
      </div>
    </div>
  </header>

  <!-- OVERLAY (identical on every page) -->
  <div class="overlay" id="overlay"></div>

  <!-- MOBILE MENU (identical on every page) -->
  <nav class="mobile-menu" id="mobileMenu" aria-label="Site navigation">
    <div class="menu-header">
      <div class="menu-logo">Solène</div>
      <div class="menu-tagline">Luxury Beauty · Cosmic Glow</div>
    </div>

    <!-- Hamburger Menu Options -->
    <div class="menu-nav">
      <a href="About.html"><span class="link-num">01</span> About</a>
      <a href="Products.html"><span class="link-num">02</span> Products</a>
      <a href="Booking.html"><span class="link-num">03</span> Booking</a>
      <a href="Homepage.html"><span class="link-num">04</span> Home</a>
    </div>

    <div class="menu-footer">

      <div class="menu-socials">
        <a href="#">IG</a>
        <a href="#">TK</a>
        <a href="#">PT</a>
      </div>
      
    </div>
  </nav>

  <!-- CONTACT INFORMATION (unique to this page) -->
  <main>
    <section class="page-hero">
      <h1>Contact</h1>
    </section>

    <!-- Contact form container and details -->
    <div class="form-container">

      <form id="contactForm">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" placeholder="Type your message here..." required></textarea>

        <button type="submit">Send</button>
      </form>

    </div>
  </main>

  <footer class="site-footer">Created by Noah Jones</footer>

  <!-- same JS file, works on every page -->
  <script src="js/main.js"></script>
</body>
</html>
